<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="description" content="NeuroVibe patient management"><title>Patients · NeuroVibe Portal</title><link rel="stylesheet" href="assets/styles.css"></head>
<body data-page="patients"><aside class="sidebar" id="sidebar"></aside><header class="topbar" id="topbar"></header><main class="workspace"><div class="workspace-inner">
  <section class="page-head"><div><div class="breadcrumb"><a href="dashboard.html">Dashboard</a><span class="material-symbols-outlined">chevron_right</span><span>Patients</span></div><h1>Patients</h1><p id="patient-count">Loading patient records…</p></div><div class="head-actions"><button class="btn btn-secondary" id="export-patients"><span class="material-symbols-outlined">download</span>Export</button><button class="btn btn-primary" data-enrollment><span class="material-symbols-outlined">person_add</span>Add patient</button></div></section>
  <section class="card filter-card" aria-label="Patient filters"><div class="filter-group"><label for="patient-search">Search patient</label><input class="filter-input" id="patient-search" placeholder="Name or patient code"></div><div class="filter-group"><label for="status-filter">Status</label><select class="select" id="status-filter"><option value="all">All statuses</option><option value="active">Active</option><option value="enrolled">Enrolled</option><option value="invited">Invited</option><option value="paused">Paused</option><option value="closed">Closed</option></select></div><div class="filter-group"><label for="device-filter">Device</label><select class="select" id="device-filter"><option value="all">Any device</option><option value="assigned">Assigned</option><option value="unassigned">Unassigned</option></select></div><button class="btn btn-secondary" id="reset-filters">Reset</button></section>
  <section class="card"><div class="table-wrap"><table class="data-table"><thead><tr><th>Patient</th><th>Code</th><th>Status</th><th>Assigned device</th><th>Care plan</th><th>Next appointment</th><th></th></tr></thead><tbody id="patient-body"><tr><td colspan="7" class="loading"><span class="spinner"></span></td></tr></tbody></table></div></section>
</div></main><script type="module" src="assets/app.js"></script></body></html>
