<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="description" content="NeuroVibe clinical dashboard"><title>Dashboard · NeuroVibe Portal</title><link rel="stylesheet" href="assets/styles.css"></head>
<body data-page="dashboard"><aside class="sidebar" id="sidebar"></aside><header class="topbar" id="topbar"></header><main class="workspace"><div class="workspace-inner">
  <section class="page-head"><div><div class="breadcrumb"><span>Clinical workspace</span><span class="material-symbols-outlined">chevron_right</span><span>Dashboard</span></div><h1>Dashboard</h1><p id="today-label">Loading today’s overview…</p></div><div class="head-actions"><a class="btn btn-secondary" href="schedules.html"><span class="material-symbols-outlined">event_repeat</span>Create schedule</a><button class="btn btn-primary" data-enrollment><span class="material-symbols-outlined">person_add</span>Add patient</button></div></section>
  <section class="metric-grid" aria-label="Summary metrics"><article class="metric-card"><div class="metric-top"><span class="metric-icon"><span class="material-symbols-outlined">group</span></span></div><label>Active patients</label><div class="metric-value" id="active-patients">—</div></article><article class="metric-card"><div class="metric-top"><span class="metric-icon"><span class="material-symbols-outlined">precision_manufacturing</span></span></div><label>Devices assigned</label><div class="metric-value" id="assigned-devices">—</div></article><article class="metric-card"><div class="metric-top"><span class="metric-icon"><span class="material-symbols-outlined">sensors</span></span></div><label>Devices available</label><div class="metric-value" id="available-devices">—</div></article><article class="metric-card danger"><div class="metric-top"><span class="metric-icon"><span class="material-symbols-outlined">event_busy</span></span></div><label>Missed sessions today</label><div class="metric-value" id="missed-sessions">—</div></article></section>
  <section class="dashboard-grid"><article class="card"><div class="card-head"><h2>Today’s sessions</h2><a href="schedules.html">View schedule</a></div><div class="table-wrap"><table class="data-table"><thead><tr><th>Time</th><th>Patient</th><th>Plan</th><th>Status</th><th></th></tr></thead><tbody id="today-sessions"><tr><td colspan="5" class="loading"><span class="spinner"></span></td></tr></tbody></table></div></article><aside class="card"><div class="card-head"><h2>Attention required</h2><a href="alerts.html">View alerts</a></div><div class="card-body attention-stack" id="attention-list"><div class="loading"><span class="spinner"></span></div></div></aside><article class="card full-span"><div class="card-head"><h2>Recent activity</h2><a href="audit.html">Audit log</a></div><div class="card-body attention-stack" id="recent-activity"><div class="loading"><span class="spinner"></span></div></div></article></section>
</div></main><script type="module" src="assets/app.js"></script></body></html>
